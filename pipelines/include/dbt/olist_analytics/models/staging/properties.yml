version: 2

models:
    -   name: staging_customer
        config:
            materialized: table
        schema: staging
        version: 1.0.1
        description: 'Staging layer for customer data, contain raw data from the source layer.'
        columns:

            -   name: customer_id
                description: 'key to the orders dataset. Each order has a unique customer_id.'
                data_tests:
                    -   unique:
                            config:
                                severity: warn
                    -   not_null:
                            config:
                                severity: warn

            -   name: customer_unique_id
                description: 'Customer unique identifier.'
                data_tests:
                    -   unique:
                            config:
                                severity: warn
                    -   not_null: 
                            config:
                                severity: warn

            -   name: customer_zip_code_prefix
                description: 'First five digits of customer zip code.'
                data_tests:
                    -   generic_value_len:
                            arguments:
                                length: 5
                            config:
                                severity: warn
                    -   not_null:
                            config:
                                severity: warn

            -   name: customer_city
                description: 'Customer city name.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn
                    -   relationships:
                            arguments:
                                to: ref('staging_location')
                                field: geolocation_city
                            config:
                                severity: warn

            -   name: customer_state
                description: 'Customer state.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn
                    -   generic_value_len:
                            arguments:
                                length: 2 
                            config:
                                severity: warn
                    -   relationships:
                            arguments:
                                to: ref('staging_location')
                                field: geolocation_state
                            config:
                                severity: warn


    -   name: staging_location
        config:
            materialized: table
        schema: staging
        version: 1.0.0
        description: 'Staging layer for location data, contain raw data from the source layer.'
        columns:

            -   name: geolocation_zip_code_prefix
                description: 'First five digits of zip code.'
                data_tests:
                    -   unique:
                            config:
                                severity: warn
                    -   generic_value_len:
                            arguments:
                                length: 5
                            config:
                                severity: warn
                    -   not_null:
                            config:
                                severity: warn

            -   name: geolocation_lat
                description: 'Latitude of the geolocation.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn

            -   name: geolocation_lng
                description: 'Longitude of the geolocation.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn

            -   name: geolocation_city
                description: 'City name of the geolocation.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn

            -   name: geolocation_state
                description: 'State of the geolocation.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn

    -   name: staging_order_items
        config:
            materialized: table
        schema: staging
        version: 1.0.0
        description: 'Staging layer for order items data, contain raw data from the source layer.'
        columns:

            -   name: order_id
                description: 'Unique identifier of the order.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn

            -   name: order_item_id
                description: 'Sequential number identifying number of items included in the same order.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn
                    -   generic_non_zero_negative:
                            config:
                                severity: warn
            
            -   name: product_id
                description: 'Product identifier.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn
                #     -   relationships:
                #           arguments:
                #                to: ref('staging_products')
                #                field: product_id
                #            config:
                #                severity: warn 
            
            -   name: seller_id
                description: 'Seller identifier.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn 
                #     -   relationships:
                #            arguments:
                #                to: ref('staging_sellers')
                #                field: seller_id
                #            config:
                #                severity 
            
            -   name: shipping_limit_date
                description: 'Shipping limit date for the item.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn
            
            -   name: price
                description: 'Item price.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn

            -   name: freight_value
                description: 'Item freight value.'
                data_tests:
                    -   not_null:
                            config:
                                severity: warn