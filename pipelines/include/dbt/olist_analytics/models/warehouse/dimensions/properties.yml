version: 2

models :

    -   name: dim_date
        description: 'Dimension layer for custom date range'
        config:
            materialized: table
            enforced: true
        schema: warehouse
        version: 1.0.0
        columns:

                -   name: date_key
                    description: 'Date identifier.'
                    data_type: string
                    constraints:
                        -   type: primary_key
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error
                        -   unique:
                                config:
                                    severity: error

                -   name: full_date
                    description: 'Full date.'
                    date_type: date
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error
                        -   unique:
                                config:
                                    severity: error

                -   name: day_of_week
                    description: 'Day of the week.'
                    date_type: integer
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: day_name
                    description: 'Day name.'
                    date_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: day_of_month
                    description: 'Day of the month.'
                    date_type: integer
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: week_of_year
                    description: 'Week of the year.'
                    date_type: integer
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: month_of_year
                    description: 'Month of the year.'
                    date_type: integer
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: month_name
                    description: 'Month name.'
                    date_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: quarter_of_year
                    description: 'Quarter of the year.'
                    date_type: integer
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: year
                    description: 'Year.'
                    date_type: integer
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: is_weekend
                    description: 'Indicates if the date is a weekend.'
                    date_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error
                
                -   name: load_timestamp
                    description: 'Timestamp when the record was loaded.'
                    date_type: timestamp
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error
    
    -   name: dim_customer
        description: 'Dimension layer for customer data'
        config:
            materialized: incremental
            unique_key: customer_key
            on_schema_change: fail
            incremental_strategy: merge
            enforced: true
        schema: warehouse
        version: 1.0.0
        columns:

                -   name: customer_key
                    description: 'Customer identifier.'
                    data_type: string
                    constraints:
                        -   type: primary_key
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error
                        -   unique:
                                config:
                                    severity: error

                -   name: customer_unique_id
                    description: 'Customer identifier.'
                    data_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: customer_zip_code_prefix
                    description: 'Zip code prefix of the customer.'
                    data_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: customer_city
                    description: 'City of the customer.'
                    data_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: customer_state
                    description: 'State of the customer.'
                    data_type: string
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error

                -   name: load_timestamp
                    description: 'Timestamp when the record was loaded.'
                    date_type: timestamp
                    data_tests:
                        -   not_null:
                                config:
                                    severity: error
    
